# Railway nixpacks config for Kotlin/Ktor + React frontend

[phases.setup]
nixPkgs = [
  "jdk17",
  "nodejs_20",
  "tesseract",
  "poppler_utils",
  "gradle",
]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd frontend && npm run build"
]
[phases.build]
cmds = ["cd backend && gradle buildFatJar --no-daemon"]

[start]
cmd = "java -jar backend/build/libs/app.jar"
